<html lang="zh-CN">
<head>

    <style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Microsoft YaHei', sans-serif; background: linear-gradient(135deg, #1a1a2e, #16213e); min-height: 100vh; color: #fff; }
.container { display: flex; max-width: 1500px; margin: 0 auto; padding: 20px; gap: 20px; min-height: 100vh; }

.control-panel { width: 300px; height: calc(100vh - 40px); background: rgba(255,255,255,0.05); border-radius: 12px; padding: 20px; display: flex; flex-direction: column; gap: 15px; flex-shrink: 0; position: sticky; top: 20px; }
.control-panel h2 { text-align: center; color: #ffd700; font-size: 20px; }
.control-panel .subtitle { text-align: center; color: #888; font-size: 12px; margin-bottom: 5px; }
.search-box input { width: 100%; padding: 12px; border: 1px solid #444; border-radius: 8px; background: #222; color: #fff; font-size: 14px; }
.search-box input:focus { outline: none; border-color: #ffd700; }
.pet-list-header { color: #aaa; font-size: 14px; }
.pet-list-header span { color: #ffd700; }
.pet-list { flex: 1; min-height: 0; overflow-y: auto; background: #222; border-radius: 8px; padding: 8px; }
.pet-item { padding: 10px 12px; margin-bottom: 3px; background: #333; border-radius: 6px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; border-left: 3px solid transparent; font-size: 14px; }
.pet-item:hover { background: #444; }
.pet-item.selected { background: #443300; border-left-color: #ffd700; }
.pet-item .count { color: #888; font-size: 12px; }
.pet-item .speed-tag { color: #8cf; font-size: 11px; margin-left: 4px; }

.filter-row { display: flex; gap: 8px; flex-wrap: wrap; }
.filter-tag { padding: 5px 12px; border-radius: 14px; font-size: 12px; cursor: pointer; border: 1px solid #555; background: #333; color: #aaa; transition: all 0.2s; user-select: none; }
.filter-tag:hover { border-color: #888; }
.filter-tag.active { border-color: #ffd700; color: #ffd700; background: rgba(255,215,0,0.1); }

.display-area { flex: 1; display: flex; flex-direction: column; gap: 20px; min-width: 0; }
.title-bar { background: rgba(255,255,255,0.05); border-radius: 12px; padding: 20px; display: flex; align-items: center; gap: 15px; flex-wrap: wrap; }
.title-bar h2 { color: #ffd700; font-size: 24px; }
.title-bar .stats { color: #aaa; font-size: 14px; }
.empty-hint { color: #666; text-align: center; padding: 60px 20px; font-size: 16px; }

.info-cards { display: flex; gap: 12px; flex-wrap: wrap; }
.info-card { background: rgba(255,255,255,0.05); border-radius: 10px; padding: 14px 18px; min-width: 120px; border: 1px solid #333; }
.info-card .label { color: #888; font-size: 11px; margin-bottom: 4px; }
.info-card .value { color: #fff; font-size: 16px; font-weight: bold; }
.info-card .value.speed { color: #8cf; }
.info-card .value.passengers { color: #fc6; }
.info-card .value.feed { color: #6c6; }

.result-panel { background: rgba(255,255,255,0.05); border-radius: 12px; padding: 20px; flex: 1; overflow: auto; }
.section-title { color: #aaa; font-size: 13px; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid #333; }
.result-table { width: 100%; border-collapse: collapse; background: #222; border-radius: 8px; overflow: hidden; table-layout: fixed; }
.result-table th { background: #1a1a1a; color: #aaa; font-size: 13px; padding: 12px 10px; text-align: left; position: sticky; top: 0; z-index: 1; }
.result-table th:nth-child(1) { width: 20%; }
.result-table th:nth-child(2) { width: 10%; }
.result-table th:nth-child(3) { width: 15%; }
.result-table th:nth-child(4) { width: 55%; }
.result-table td { padding: 10px; border-bottom: 1px solid #333; font-size: 14px; vertical-align: top; }
.result-table tr:hover { background: #2a2a3a; }
.status-name { color: #fff; font-weight: bold; }
.status-desc { color: #999; font-size: 12px; line-height: 1.5; }
.status-desc .pw-val { color: #0f8; font-weight: bold; }
.strength-cell { font-weight: bold; color: #fc6; }
.type-cell { color: #888; font-size: 12px; }

.appearance-panel { background: rgba(255,255,255,0.05); border-radius: 12px; padding: 16px 20px; }
.appearance-tags { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
.appearance-tag { padding: 6px 14px; border-radius: 14px; font-size: 12px; border: 1px solid #335; color: #8cf; background: rgba(136,204,255,0.08); }
.appearance-tag .nature-hint { color: #666; font-size: 11px; margin-left: 6px; }

.feed-panel { background: rgba(255,255,255,0.05); border-radius: 12px; padding: 16px 20px; }
.feed-tags { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
.feed-tag { padding: 6px 14px; border-radius: 14px; font-size: 12px; border: 1px solid #3a4a3a; color: #6ecfa0; background: rgba(110,207,160,0.08); }
.feed-tag .sat { color: #fc6; margin-left: 6px; }

.status-filter-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
.status-chip { padding: 4px 10px; border-radius: 12px; font-size: 11px; cursor: pointer; border: 1px solid #444; background: #2a2a2a; color: #888; transition: all 0.2s; user-select: none; }
.status-chip:hover { border-color: #888; color: #ccc; }
.status-chip.active { border-color: #0d6; color: #0f8; background: rgba(0,255,136,0.08); }

.warning-bar { background: rgba(255,180,0,0.15); border: 1px solid rgba(255,180,0,0.4); color: #ffb400; text-align: center; padding: 8px 16px; font-size: 13px; border-radius: 8px; margin-bottom: 10px; }
::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: #1a1a1a; }
::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }
</style>

let currentPet = null;
let passengerFilter = 'all';
let statusFilter = new Set();

function matchSearch(name, search) {
    if (!search) return true;
    return name.toLowerCase().includes(search);
}

function init() {
    renderPetList();
    document.getElementById('searchInput').addEventListener('input', () => renderPetList());

    document.querySelectorAll('.filter-tag[data-passenger]').forEach(tag => {
        tag.addEventListener('click', () => {
            passengerFilter = tag.dataset.passenger;
            document.querySelectorAll('.filter-tag[data-passenger]').forEach(t =>
                t.classList.toggle('active', t.dataset.passenger === passengerFilter));
            renderPetList();
        });
    });

    renderStatusChips();
}

function renderStatusChips() {
    const container = document.getElementById('statusChips');
    if (!container) return;
    const counts = {};
    DATA.pets.forEach(p => {
        p.statuses.forEach(s => {
            counts[s.name] = (counts[s.name] || 0) + 1;
        });
    });
    const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]);
    container.innerHTML = sorted.map(([name, count]) =>
        `<span class="status-chip ${statusFilter.has(name) ? 'active' : ''}" data-status="${name}">${name} (${count})</span>`
    ).join('');

    container.querySelectorAll('.status-chip').forEach(chip => {
        chip.addEventListener('click', () => {
            const name = chip.dataset.status;
            if (statusFilter.has(name)) {
                statusFilter.delete(name);
            } else {
                statusFilter.add(name);
            }
            renderStatusChips();
            renderPetList();
        });
    });
}

function petMatchesFilter(pet) {
    if (passengerFilter !== 'all') {
        const target = parseInt(passengerFilter);
        if (pet.maxPassengers !== target) return false;
    }
    if (statusFilter.size > 0) {
        const petStatuses = new Set(pet.statuses.map(s => s.name));
        for (const s of statusFilter) {
            if (!petStatuses.has(s)) return false;
        }
    }
    return true;
}

function renderPetList() {
    const search = (document.getElementById('searchInput').value || '').toLowerCase();
    const list = document.getElementById('petList');

    const filtered = DATA.pets.filter(pet => {
        if (!matchSearch(pet.name, search)) return false;
        return petMatchesFilter(pet);
    });

    document.getElementById('petCount').textContent = filtered.length;

    list.innerHTML = filtered.map(pet => {
        const statusCount = pet.statuses.length;
        return `<div class="pet-item ${currentPet === pet.name ? 'selected' : ''}" onclick="selectPet('${pet.name.replace(/'/g, "\\'")}')">
            <span>${pet.name}<span class="speed-tag">${pet.speed}</span></span>
            <span class="count">${statusCount}状态</span>
        </div>`;
    }).join('');
}

function selectPet(name) {
    currentPet = name;
    renderPetList();
    updateDisplay();
}

function updateDisplay() {
    const titleBar = document.getElementById('titleBar');
    const infoCards = document.getElementById('infoCards');
    const resultPanel = document.getElementById('resultPanel');
    const appearancePanel = document.getElementById('appearancePanel');
    const feedPanel = document.getElementById('feedPanel');

    if (!currentPet) {
        titleBar.innerHTML = '<div class="empty-hint">请从左侧选择一个骑宠</div>';
        infoCards.innerHTML = '';
        resultPanel.innerHTML = '';
        appearancePanel.innerHTML = '';
        feedPanel.style.display = 'none';
        return;
    }

    const pet = DATA.pets.find(p => p.name === currentPet);
    if (!pet) return;

    titleBar.innerHTML = `
        <h2>${pet.name}</h2>
        <span class="stats">ID: ${pet.id} | ${pet.statuses.length} 个状态 | 状态组: ${pet.statusGroupName || '无'}</span>
    `;

    infoCards.innerHTML = `
        <div class="info-card"><div class="label">移动速度</div><div class="value speed">${pet.speed}</div></div>
        <div class="info-card"><div class="label">最大乘员</div><div class="value passengers">${pet.maxPassengers}</div></div>
        <div class="info-card"><div class="label">喂食类型</div><div class="value feed">${pet.feedType || '无'}</div></div>
    `;

    // 状态表
    if (pet.statuses.length > 0) {
        let html = '<div class="section-title">骑宠天性（状态组）</div>';
        html += '<table class="result-table">';
        html += '<thead><tr><th>状态名</th><th>强度</th><th>类型</th><th>描述</th></tr></thead>';
        html += '<tbody>';
        pet.statuses.forEach(s => {
            html += `<tr>
                <td class="status-name">${s.name}</td>
                <td class="strength-cell">${s.strength}</td>
                <td class="type-cell">${s.type}</td>
                <td class="status-desc">${s.desc || '--'}</td>
            </tr>`;
        });
        html += '</tbody></table>';
        resultPanel.innerHTML = html;
    } else {
        resultPanel.innerHTML = '<div class="section-title">骑宠天性（状态组）</div><div style="color:#666;text-align:center;padding:30px;">该骑宠无状态组</div>';
    }

    // 外表映射
    if (pet.appearances.length > 0) {
        let html = '<div class="section-title">外表映射</div><div class="appearance-tags">';
        pet.appearances.forEach(a => {
            html += `<span class="appearance-tag">${a.appearance}<span class="nature-hint">${a.natureName}</span></span>`;
        });
        html += '</div>';
        appearancePanel.innerHTML = html;
    } else {
        appearancePanel.innerHTML = '';
    }

    // 喂食道具
    if (pet.feedItems && pet.feedItems.length > 0) {
        feedPanel.style.display = 'block';
        let html = '<div class="section-title">喂食道具</div><div class="feed-tags">';
        pet.feedItems.forEach(item => {
            html += `<span class="feed-tag">${item.name}${item.satisfaction ? '<span class="sat">+' + item.satisfaction + '</span>' : ''}</span>`;
        });
        html += '</div>';
        feedPanel.innerHTML = html;
    } else {
        feedPanel.style.display = 'none';
    }
}

document.addEventListener('DOMContentLoaded', init);

    </script>
</body>
</html>
