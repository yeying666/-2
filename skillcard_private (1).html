* { margin: 0; padding: 0; box-sizing: border-box; }

.level-selector label, .rarity-filter label { display: block; margin-bottom: 8px; color: #aaa; font-size: 14px; }
.level-buttons, .rarity-buttons { display: flex; gap: 8px; flex-wrap: wrap; }
.level-btn { width: 50px; height: 40px; border: 2px solid #ffd700; border-radius: 8px; background: #333; color: #ffd700; font-weight: bold; cursor: pointer; }
.level-btn.active { background: #ffd700; color: #000; }
.rarity-btn { padding: 6px 12px; border: 1px solid #444; border-radius: 6px; background: #333; color: #fff; cursor: pointer; font-size: 13px; }
.rarity-btn.active { border-color: #ffd700; background: #443300; }
.card-list-header { color: #aaa; font-size: 14px; }
.card-list-header span { color: #ffd700; }
.card-list { max-height: 500px; overflow-y: auto; background: #222; border-radius: 8px; padding: 8px; }
.card-list-empty { color: #666; text-align: center; padding: 40px 20px; font-size: 14px; }

.card-list-item.selected { background: #443300; border-left-color: #ffd700; }
.card-list-item .name { font-size: 14px; }
.card-list-item .rarity { padding: 2px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; }
.card-display { flex: 1; display: flex; flex-direction: column; gap: 20px; }
.card-frame { background: linear-gradient(180deg, #2a2a4a, #1a1a30); border-radius: 16px; padding: 20px; border: 3px solid #4a4a6a; max-width: 420px; margin: 0 auto; }
.card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px solid #444; }
.card-name { font-size: 22px; font-weight: bold; }
.card-pet-range { font-size: 14px; text-align: center; margin-bottom: 10px; padding: 6px 10px; background: rgba(136,204,204,0.08); border-radius: 4px; line-height: 1.8; }
.card-pet-range .label { color: #aaa; }
.range-category { color: #4db8ff; }
.range-pet { color: #ffa033; }
.range-sep { color: #555; }
.card-rarity { padding: 5px 15px; border-radius: 20px; font-weight: bold; }
.card-rarity.E { background: #666; } .card-rarity.D { background: #0a0; } .card-rarity.C { background: #08f; }
.card-rarity.B { background: #808; } .card-rarity.A { background: #f80; } .card-rarity.S { background: #f00; }
.card-rarity.SS { background: linear-gradient(135deg, #ffd700, #f80); color: #000; }
.card-level { text-align: center; font-size: 28px; color: #ffd700; margin-bottom: 15px; }
.card-skill { text-align: center; padding: 10px; background: #222; border-radius: 8px; margin-bottom: 15px; }
.card-skill .label { color: #888; }
.card-skill .value { color: #ffd700; font-weight: bold; font-size: 18px; margin-left: 10px; }
.card-desc { background: #222; border-radius: 8px; padding: 15px; margin-bottom: 15px; }
.card-desc .title { color: #888; font-size: 12px; margin-bottom: 8px; }
.card-desc p { color: #ddd; line-height: 1.6; font-size: 14px; }
.param-value { color: #0f8; font-weight: bold; background: rgba(0,255,136,0.1); padding: 0 4px; border-radius: 3px; }
.card-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 15px; }
.stat-item { background: #222; border-radius: 8px; padding: 10px; text-align: center; }

.params-panel { background: rgba(255,255,255,0.05); border-radius: 12px; padding: 20px; }

const LEVELS = [0, 1, 16, 33, 36];
const RARITY_COLORS = {E:'#666',D:'#0a0',C:'#08f',B:'#808',A:'#f80',S:'#f00',SS:'#ffd700'};

let currentLevel = 1;
let currentRarity = 'all';
let currentCard = null;

function init() {
    bindEvents();
    renderCardList('')
}

function showEmptyHint() {
    const list = document.getElementById('cardList');
    list.innerHTML = '<div class="card-list-empty">请输入关键词搜索卡片<br>或选择稀有度筛选</div>';
    document.getElementById('cardCount').textContent = '0';
}

function bindEvents() {
    document.getElementById('searchInput').addEventListener('input', e => {
        renderCardList(e.target.value.toLowerCase());
    });

    document.querySelectorAll('.level-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentLevel = parseInt(btn.dataset.level);
            if (currentCard) updateCardDisplay();
        });
    });

    document.querySelectorAll('.rarity-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.rarity-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentRarity = btn.dataset.rarity;
            renderCardList(document.getElementById('searchInput').value.toLowerCase());
        });
    });
}

function renderCardList(search = '') {
    const list = document.getElementById('cardList');



    const filteredCards = Object.entries(DATA.cards)
        .filter(([name, card]) => {
            if (currentRarity !== 'all' && card.rarity !== currentRarity) return false;
            if (search && !name.toLowerCase().includes(search) && !(card.skill||'').toLowerCase().includes(search)) return false;
            return true;
        })
        .sort((a, b) => (b[1].index || 0) - (a[1].index || 0));

    document.getElementById('cardCount').textContent = filteredCards.length;

    list.innerHTML = filteredCards.map(([name, card]) => `
        <div class="card-list-item ${currentCard === name ? 'selected' : ''}" data-card="${name}">
            <span class="name">${name}</span>
            <span class="rarity" style="background:${RARITY_COLORS[card.rarity]||'#666'}">${card.rarity||'-'}</span>
        </div>
    `).join('');

    list.querySelectorAll('.card-list-item').forEach(item => {
        item.addEventListener('click', () => selectCard(item.dataset.card));
    });
}

function selectCard(name) {
    currentCard = name;
    document.querySelectorAll('.card-list-item').forEach(item => {
        item.classList.toggle('selected', item.dataset.card === name);
    });
    updateCardDisplay();
}

function updateCardDisplay() {
    const card = DATA.cards[currentCard];
    if (!card) return;

    document.getElementById('cardName').textContent = card.name || currentCard;
    const rarityEl = document.getElementById('cardRarity');
    rarityEl.textContent = card.rarity || '-';
    rarityEl.className = 'card-rarity ' + (card.rarity || 'E');

    const petRangeEl = document.getElementById('cardPetRange');
    if (card.pet_range && card.pet_range.length > 0) {
        const parts = card.pet_range.map(item => {
            const cls = item.type === 'pet' ? 'range-pet' : 'range-category';
            return '<span class="' + cls + '">' + item.text + '</span>';
        }).join('<span class="range-sep">, </span>');
        petRangeEl.innerHTML = '<span class="label">适用: </span>' + parts;
        petRangeEl.style.display = 'block';
    } else {
        petRangeEl.style.display = 'none';
    }

    document.getElementById('cardLevel').textContent = 'Lv.' + currentLevel;
    document.getElementById('cardSkill').textContent = card.skill || '-';

    // 替换描述中的参数
    let desc = card.description || '';
    const values = card.level_values && card.level_values[String(currentLevel)] || {};
    desc = desc.replace(/\[([^\]]+)\]/g, (match, expr) => {
        let calc = expr;
        Object.entries(values).forEach(([k, v]) => { calc = calc.replace(new RegExp(k, 'g'), v); });
        try {
            if (/^[\d\s\+\-\*\/\.\(\)]+$/.test(calc)) {
                const r = eval(calc);
                return '<span class="param-value">' + Math.floor(r) + '</span>';
            }
        } catch(e) {}
        return '<span class="param-value">' + calc + '</span>';
    });
    document.getElementById('cardDesc').innerHTML = desc;

    document.getElementById('statSP').textContent = card.sp_cost || '-';
    document.getElementById('statCost').textContent = card.cost || '-' ? (parseFloat(card.cost) / 2).toFixed(1) : '-';
    document.getElementById('statPriority').textContent = card.priority || '-';
    document.getElementById('statCooldown').textContent = card.cooldown > 0 ? (parseInt(card.cooldown) - 1) : '-';
    document.getElementById('statMinLevel').textContent = card.min_level || '-';
    document.getElementById('statWarmup').textContent = card.warmup || '-';

    // 副作用（只显示非0的）
    const sideEffects = card.side_effects || {};
    const seList = document.getElementById('sideEffectsList');
    const seEntries = Object.entries(sideEffects);
    if (seEntries.length > 0) {
        document.getElementById('sideEffectsSection').style.display = 'block';
        const groupA = new Set(['自然','电气','火焰','水']);
        seList.innerHTML = seEntries.map(([name, val]) => {
            const numVal = parseFloat(val);
            const cls = groupA.has(name) ? 'group-a' : 'group-b';
            const prefix = numVal > 0 ? '+' : '';
            return `<span class="side-effect-item ${cls}">${name}: ${prefix}${val}</span>`;
        }).join('');
    } else {
        document.getElementById('sideEffectsSection').style.display = 'none';
    }
}

document.addEventListener('DOMContentLoaded', init);

    </script>
</body>
</html>
